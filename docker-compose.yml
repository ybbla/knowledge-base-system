services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_base
      POSTGRES_USER: kbuser
      POSTGRES_PASSWORD: kbpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbuser -d knowledge_base"]
      interval: 5s
      timeout: 5s
      retries: 5
    # pgvector extension is pre-installed in this image. Enable with:
    #   docker compose exec postgres psql -U kbuser -d knowledge_base -c "CREATE EXTENSION IF NOT EXISTS vector;"
    # Needed for Phase 3 (Milvus alternative). Phase 2 only uses JSON columns.

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: kb-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcddata:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: kb-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-standalone:
    image: milvusdb/milvus:v2.5.11
    container_name: kb-milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvusdata:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  attu:
    image: zilliz/attu:latest
    container_name: kb-attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8001:3000"
    depends_on:
      milvus-standalone:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dramatiq-worker:
    build:
      context: ./knowledge_base_system
      dockerfile: Dockerfile.worker
    container_name: kb-dramatiq-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://kbuser:kbpass@postgres:5432/knowledge_base
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_URL=redis://redis:6379/0
      - BACKEND=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    volumes:
      - ./knowledge_base_system/tests/evaluation/datasets:/app/tests/evaluation/datasets
      - ./knowledge_base_system/tests/evaluation/results:/app/tests/evaluation/results
  nginx:
    image: nginx:stable-alpine
    container_name: kb-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
    name: kb-pgdata
  etcddata:
    name: kb-etcddata
  miniodata:
    name: kb-miniodata
  milvusdata:
    name: kb-milvusdata
  redisdata:
    name: kb-redisdata
